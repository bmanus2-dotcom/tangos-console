name: Build macOS (Intel)

# electron-builder can only produce a macOS app on macOS, so the Intel (x64)
# .dmg is built here on a macOS runner. Trigger manually from the Actions tab,
# or automatically on a version tag (e.g. `git tag v3.1.9 && git push --tags`).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest # arm64 host; cross-builds the x64 target (no native deps to compile)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Intel (x64) dmg
        run: npm run console:dist:mac
        env:
          # No Apple Developer cert in CI: build unsigned. Users bypass Gatekeeper
          # via right-click > Open (or `xattr -cr "/Applications/tangOS Console.app"`).
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: tangos-console-mac-x64
          path: console/release/*.dmg
          if-no-files-found: error
